name: CI

on:
  push:
    branches: [main, test-pypi]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "If true, build and verify release artifacts without publishing. If false, publish Python artifacts to TestPyPI."
        required: false
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate package versions
        run: |
          python3 - <<'PY'
          import os
          import pathlib
          import tomllib

          root = pathlib.Path(".")
          cargo_version = tomllib.loads(root.joinpath("Cargo.toml").read_text())["package"]["version"]
          pyproject_version = tomllib.loads(root.joinpath("pyproject.toml").read_text())["project"]["version"]

          if cargo_version != pyproject_version:
              raise SystemExit(
                  f"Version mismatch: Cargo.toml={cargo_version} pyproject.toml={pyproject_version}"
              )

          ref = os.environ.get("GITHUB_REF", "")
          if ref.startswith("refs/tags/v"):
              tag_version = ref.removeprefix("refs/tags/v")
              if tag_version != cargo_version:
                  raise SystemExit(
                      f"Tag version {tag_version} does not match package version {cargo_version}"
                  )

          print(f"Validated package version {cargo_version}")
          PY

  test-rust:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features
      - run: cargo clippy --all-features -- -D warnings

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: python -m pip install --upgrade pip maturin numpy pytest
      - name: Build wheel
        run: maturin build --release --out dist
      - name: Install built wheel
        run: python -m pip install dist/*.whl
      - run: pytest

  build-wheels:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [validate-release, test-rust, test-python]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            maturin_extra_args: -i python3.12
            manylinux: "2_28"
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            maturin_extra_args: -i python3.12
            manylinux: "2_28"
          - os: macos-13
            target: x86_64-apple-darwin
            maturin_extra_args: ""
            manylinux: "off"
          - os: macos-latest
            target: aarch64-apple-darwin
            maturin_extra_args: ""
            manylinux: "off"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            maturin_extra_args: ""
            manylinux: "off"
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set TestPyPI version
        if: github.ref == 'refs/heads/test-pypi' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")

          base_version = match.group(1).split(".dev", 1)[0]
          test_version = f"{base_version}.dev{os.environ['GITHUB_RUN_NUMBER']}{os.environ['GITHUB_RUN_ATTEMPT']}"
          path.write_text(text[:match.start(1)] + test_version + text[match.end(1):])
          print(f"Set TestPyPI package version to {test_version}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist ${{ matrix.maturin_extra_args }}
          manylinux: ${{ matrix.manylinux }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  build-wheel-testpypi:
    if: github.ref == 'refs/heads/test-pypi'
    needs: [validate-release, test-rust, test-python]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set TestPyPI version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")

          base_version = match.group(1).split(".dev", 1)[0]
          test_version = f"{base_version}.dev{os.environ['GITHUB_RUN_NUMBER']}{os.environ['GITHUB_RUN_ATTEMPT']}"
          path.write_text(text[:match.start(1)] + test_version + text[match.end(1):])
          print(f"Set TestPyPI package version to {test_version}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-gnu
          args: --release --out dist -i python3.12
          manylinux: "2_28"
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-x86_64-unknown-linux-gnu
          path: dist/*.whl

  build-sdist:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [validate-release, test-rust, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set TestPyPI version
        if: github.ref == 'refs/heads/test-pypi' || (github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true')
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")

          base_version = match.group(1).split(".dev", 1)[0]
          test_version = f"{base_version}.dev{os.environ['GITHUB_RUN_NUMBER']}{os.environ['GITHUB_RUN_ATTEMPT']}"
          path.write_text(text[:match.start(1)] + test_version + text[match.end(1):])
          print(f"Set TestPyPI package version to {test_version}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-sdist-testpypi:
    if: github.ref == 'refs/heads/test-pypi'
    needs: [validate-release, test-rust, test-python]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set TestPyPI version
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          path = pathlib.Path("pyproject.toml")
          text = path.read_text()
          match = re.search(r'(?m)^version = "([^"]+)"$', text)
          if match is None:
              raise SystemExit("Could not find project version in pyproject.toml")

          base_version = match.group(1).split(".dev", 1)[0]
          test_version = f"{base_version}.dev{os.environ['GITHUB_RUN_NUMBER']}{os.environ['GITHUB_RUN_ATTEMPT']}"
          path.write_text(text[:match.start(1)] + test_version + text[match.end(1):])
          print(f"Set TestPyPI package version to {test_version}")
          PY
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  dry-run-checks:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify crates.io packaging
        run: cargo publish --dry-run --locked
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: List built artifacts
        run: |
          echo "Built artifacts:"
          ls -lh dist
          echo
          echo "Wheel count: $(find dist -maxdepth 1 -name '*.whl' | wc -l)"
          echo "Sdist count: $(find dist -maxdepth 1 -name '*.tar.gz' | wc -l)"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Test Linux wheel install
        run: |
          python -m pip install dist/*manylinux*x86_64*.whl
          python -c "import fast_vad; fast_vad.VAD(16000); print('fast_vad import smoke test passed')"

  publish-testpypi:
    if: github.ref == 'refs/heads/test-pypi'
    needs: [build-wheel-testpypi, build-sdist-testpypi]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check TestPyPI token
        env:
          PYPI_TEST_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: |
          if [ -z "$PYPI_TEST_TOKEN" ]; then
            echo "PYPI_TEST_TOKEN is missing for this job."
            echo "Add it as a secret in the repository or in the release environment."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          packages-dir: dist
          password: ${{ secrets.PYPI_TEST_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  publish-testpypi-manual:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Check TestPyPI token
        env:
          PYPI_TEST_TOKEN: ${{ secrets.PYPI_TEST_TOKEN }}
        run: |
          if [ -z "$PYPI_TEST_TOKEN" ]; then
            echo "PYPI_TEST_TOKEN is missing for this job."
            echo "Add it as a secret in the repository or in the release environment."
            exit 1
          fi
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          packages-dir: dist
          password: ${{ secrets.PYPI_TEST_TOKEN }}
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    if: github.ref == 'refs/heads/test-pypi'
    needs: [publish-testpypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install published package from TestPyPI
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' | head -n1)"
          version="$(basename "$wheel" | cut -d- -f2)"
          python -m venv /tmp/testpypi-smoke
          . /tmp/testpypi-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "fast-vad==$version"
          python - <<'PY'
          import fast_vad

          vad = fast_vad.VAD(16000)
          print("Installed from TestPyPI:", fast_vad.__file__)
          print("Frame size:", vad.frame_size)
          PY

  smoke-test-testpypi-manual:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run != 'true'
    needs: [publish-testpypi-manual]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install published package from TestPyPI
        run: |
          wheel="$(find dist -maxdepth 1 -name '*.whl' | head -n1)"
          version="$(basename "$wheel" | cut -d- -f2)"
          python -m venv /tmp/testpypi-smoke
          . /tmp/testpypi-smoke/bin/activate
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "fast-vad==$version"
          python - <<'PY'
          import fast_vad

          vad = fast_vad.VAD(16000)
          print("Installed from TestPyPI:", fast_vad.__file__)
          print("Frame size:", vad.frame_size)
          PY

  publish-pypi:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  publish-crates:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
